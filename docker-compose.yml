version: "3.9"

services:
  api:
    image: python:3.12-slim
    working_dir: /workspace
    volumes:
      - ./:/workspace
    command: bash -lc "pip install -r requirements.txt && python -m uvicorn services.mesh_api.app.main:app --host 0.0.0.0 --port 8014"
    ports:
      - "8014:8014"

  neo4j:
    image: neo4j:5
    environment:
      NEO4J_AUTH: neo4j/testtest123
    ports:
      - "7474:7474"
      - "7687:7687"

  redis:
    image: redis:7
    ports:
      - "6379:6379"

